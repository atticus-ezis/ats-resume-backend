name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.0

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.5.0
        with:
          images: ghcr.io/atticus-ezis/resume-builder-v2
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6.0.2
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Uses environment "IONOS VM DEPLOYMENT" with secrets: SSH_PRIVATE_KEY, DEPLOY_HOST, DEPLOY_USER
  deploy:
    runs-on: ubuntu-latest
    needs: [test, build-and-push]
    environment:
      name: IONOS VM DEPLOYMENT
      url: https://api.ats-resume-builder.com/api/docs/
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/resume-builder
            docker compose up -d --pull always

      - name: Health Check
        run: |
          echo "Waiting for deployment to become ready..."
          for i in $(seq 1 12); do
            if curl -sf "https://api.ats-resume-builder.com/health-check/" > /dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/12 failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 12 attempts"
          exit 1
